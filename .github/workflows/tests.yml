name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install --yes libdbus-1-3 libegl1 libgl1 libxcb-cursor0 libxkbcommon-x11-0 libxkbcommon0 xvfb
      - name: Install project and test dependencies
        run: python -m pip install ".[test]"
      - name: Verify Qt offscreen platform plugin
        run: |
          python - <<'PY'
          from pathlib import Path
          from PySide6.QtCore import QLibraryInfo

          plugins_path = Path(QLibraryInfo.path(QLibraryInfo.LibraryPath.PluginsPath))
          assert (plugins_path / "platforms" / "libqoffscreen.so").is_file()
          PY
      - name: Run tests headlessly
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/test_main_window.py
